envFrom:
  - secretRef:
      name: opensearch-creds
  - secretRef:
      name: monittimber-creds

logLevel: info

## Fluent Bit configuration
service:
  type: ClusterIP
  port: 2020
  internalTrafficPolicy:
  loadBalancerClass:
  loadBalancerSourceRanges: []
  labels: {}
  annotations:
    prometheus.io/path: "/api/v1/metrics/prometheus"
    prometheus.io/port: "2020"
    prometheus.io/scrape: "true"
  externalIPs: []

flush: 1
metricsPort: 2020

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

## Don't need this until further parsing is added
# [FILTER]
#     Name rewrite_tag
#     Match kube.*
#     Rule $kubernetes['container_name'] rucio-server logs.access false
#     Rule $kubernetes['container_name'] rucio-daemons logs.event false
#     Rule $kubernetes['container_name'] httpd-error-log logs.error false

## Mounting /etc/machine-id with FileOrCreate
daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: etcmachineid
    hostPath:
      path: /etc/machine-id
      type: FileOrCreate
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
      type: DirectoryOrCreate

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush {{ .Values.flush }}
        Log_Level {{ .Values.logLevel }}
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port {{ .Values.metricsPort }}
        Health_Check On

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*_rucio_*.log
        Tag kube.*
        Parser logcri
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Annotations Off
        Labels Off
        Keep_Log On
        K8S-Logging.Exclude On

    # Retag records from the main rucio-server container for dedicated access-log parsing.
    # Matching records are moved to logs.server.* and parsed there.
    [FILTER]
        Name rewrite_tag
        Match kube.*
        Rule $kubernetes['container_name'] ^rucio-server$ logs.server.$TAG false

    # Parse Apache access-style lines emitted by server/authserver/traceserver pods.
    # Non-matching records under logs.server.* are left unchanged.
    [FILTER]
        Name parser
        Match logs.server.*
        Key_Name message
        Parser rucio_server_access
        Reserve_Data On
        Preserve_Key On

    [FILTER]
        Name record_modifier
        Match kube.*
        Record producer cmsrucio
        Record type logs
        Remove_key annotations
        Remove_key labels

    [FILTER]
        Name record_modifier
        Match logs.server.*
        Record producer cmsrucio
        Record type logs
        Remove_key annotations
        Remove_key labels

  customParsers: |
    [PARSER]
        Name logcri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

    # Apache logFormat used by rucio-server chart:
    # [%{%Y-%m-%d %H:%M:%S}t]\t%v\t%h\t%{X-Forwarded-For}i\t%{X-Rucio-RequestId}i\t%>s\t%I\t%B\t%D\t"%r"\t"%{X-Rucio-Account}i"\t"%{User-Agent}i"\t%{X-Rucio-Script}i
    [PARSER]
        Name rucio_server_access
        Format regex
        Regex ^\[(?<request_time>[^\]]+)\]\t(?<vhost>[^\t]+)\t(?<remote_host>[^\t]+)\t(?<x_forwarded_for>[^\t]+)\t(?<request_id>[^\t]+)\t(?<status_code>\d{3})\t(?<bytes_in>(?:\d+|-))\t(?<bytes_out>(?:\d+|-))\t(?<duration_us>(?:\d+|-))\t\"(?<http_method>[A-Z]+)\s+(?<http_path>[^\s\"]+)\s+(?<http_version>[^\"]+)\"\t\"(?<rucio_account>[^\"]*)\"\t\"(?<http_user_agent>[^\"]*)\"\t(?<rucio_script>.*)$

  outputs: |
    [OUTPUT]
        Name HTTP
        Match *
        Host ${timberHost}
        Port ${timberPort}
        URI ${timberPath}
        HTTP_User ${timberUser}
        HTTP_Passwd ${timberPassword}
        Format json
        tls On
        tls.verify Off

apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: GitRepository
metadata:
  name: rucio-git
  namespace: flux-system
spec:
  interval: 30m
  url: https://github.com/juanpablosalas/helm-charts.git
  ref:
    branch: master
  ignore: |
    # exclude all
    /*
    # include charts directory
    !/helm/
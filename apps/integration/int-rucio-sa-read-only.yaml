apiVersion: v1  
kind: ServiceAccount  
metadata:  
  name: rucio-read-only  
  namespace: rucio  
---  
apiVersion: rbac.authorization.k8s.io/v1  
kind: ClusterRole  
metadata:  
  name: rucio-read-only  
rules:  
- apiGroups:  
  - ""  
  resources:  
  - pods  
  - services  
  - configmaps  
  - secrets  
  verbs:  
  - get  
  - list  
  - watch  
- apiGroups:  
  - apps  
  resources:  
  - deployments  
  - statefulsets  
  - daemonsets  
  verbs:  
  - get  
  - list  
  - watch  
---  
apiVersion: rbac.authorization.k8s.io/v1  
kind: ClusterRoleBinding  
metadata:  
  name: rucio-read-only  
roleRef:  
  apiGroup: rbac.authorization.k8s.io  
  kind: ClusterRole  
  name: rucio-read-only  
subjects:  
- kind: ServiceAccount  
  name: rucio-read-only  
  namespace: rucio
